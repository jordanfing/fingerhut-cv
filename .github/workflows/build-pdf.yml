name: Build PDF

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'favicon.svg'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Print HTML to PDF via Chrome headless
        run: |
          google-chrome --headless --disable-gpu --no-sandbox \
            --no-pdf-header-footer \
            --virtual-time-budget=8000 \
            --print-to-pdf=Fingerhut_Jordan_Resume.pdf \
            "file://${{ github.workspace }}/index.html"

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Fingerhut_Jordan_Resume.pdf; then
            echo "PDF unchanged, skipping commit"
          else
            git add Fingerhut_Jordan_Resume.pdf
            git commit -m "chore(ci): rebuild PDF [skip ci]"
            git push
          fi
